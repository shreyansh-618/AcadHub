version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: academic-platform-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:3000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - academic-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: academic-platform-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VECTOR_SEARCH_INDEX_NAME=${VECTOR_SEARCH_INDEX_NAME:-resource_embedding_index}
    depends_on:
      - mongodb
    volumes:
      - ./backend/src:/app/src
    networks:
      - academic-network

  mongodb:
    image: mongo:7.0
    container_name: academic-platform-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=academic_platform
    volumes:
      - mongodb_data:/data/db
      - ./docs/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - academic-network

volumes:
  mongodb_data:

networks:
  academic-network:
    driver: bridge
